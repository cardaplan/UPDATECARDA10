
<script>
// ===== Extensions: Flat Fee, Minimum Order, Advanced Coupons, Scheduling, Loyalty =====
(function(){
  // Utils
  function toNumber(val){
    if (val === null || val === undefined || val === '') return null;
    const n = parseFloat(String(val).replace(',', '.'));
    return isNaN(n) ? null : n;
  }
  function getFlatDeliveryFee(){
    try {
      const cfg = (typeof getCheckoutConfig === 'function') ? getCheckoutConfig() : null;
      const raw = cfg && cfg.valor_taxa_unica ? String(cfg.valor_taxa_unica).trim() : '';
      if (!raw) return null;
      const n = parseFloat(raw.replace(',', '.'));
      return isNaN(n) ? null : n;
    } catch(_) { return null; }
  }

  // === Advanced coupon calculation override ===
  function advancedCalculateCouponDiscount(coupon){
    try {
      const cartTotal = (typeof calculateCartTotal === 'function') ? calculateCartTotal() : 0;
      const flat = getFlatDeliveryFee();
      const deliveryFee = (typeof orderData !== 'undefined' && orderData && orderData.deliveryType === 'delivery' && flat !== null) ? flat : (typeof currentDeliveryFee !== 'undefined' && currentDeliveryFee) ? currentDeliveryFee : 0;
      const discountValue = coupon.valor_desconto || coupon.valor || '';
      const discountType = (coupon.tipo_desconto || coupon.tipo || '').toString();
      const minTotalRaw = (coupon.condicao_min_total || coupon.min_total || '').toString();
      const productSkuLimit = (coupon.produto_sku || coupon.sku || '').toString().trim();
      const altRaw = (coupon.desconto_alternativo || '').toString().trim();

      const totalBeforeDiscount = cartTotal + deliveryFee;
      if (minTotalRaw){
        const minTotal = toNumber(minTotalRaw);
        if (minTotal !== null && totalBeforeDiscount < minTotal) return -3;
      }

      let restrictedBaseBySku = 0;
      if (productSkuLimit && Array.isArray(window.cart)){
        restrictedBaseBySku = cart.reduce((sum, it) => {
          if (!it) return sum;
          const sku = (it.sku || '').toString().trim().toLowerCase();
          if (sku !== productSkuLimit.toLowerCase()) return sum;
          const price = (typeof parsePrice === 'function') ? parsePrice(it.preco) : parseFloat(String(it.preco).replace(',', '.')) || 0;
          return price > 0 ? sum + (price * (it.quantity || 0)) : sum;
        }, 0);
        if (restrictedBaseBySku <= 0) return -4;
      }

      let baseValue = 0;
      switch ((discountType || '').toLowerCase()){
        case 'produtos':
          baseValue = productSkuLimit ? restrictedBaseBySku : cartTotal; if (baseValue <= 0) return -1; break;
        case 'frete':
          baseValue = deliveryFee; if (baseValue <= 0) return -2; break;
        case 'total':
          baseValue = (productSkuLimit ? restrictedBaseBySku : cartTotal) + deliveryFee; if (baseValue <= 0) return -1; break;
        default:
          return 0;
      }

      const parseDiscountValue = (val) => {
        if (!val) return 0;
        const s = val.toString();
        if (s.includes('%')){ const pct = parseFloat(s.replace('%','')); return isNaN(pct) ? 0 : (baseValue * pct)/100; }
        const num = parseFloat(s.replace(',', '.')); return isNaN(num) ? 0 : num;
      };

      const main = parseDiscountValue(discountValue);
      let best = main;
      if (altRaw && altRaw.includes('ou')){
        altRaw.split(/ou/i).map(p=>p.trim()).forEach(p => { best = Math.max(best, parseDiscountValue(p)); });
      }
      return Math.max(0, Math.min(best, baseValue));
    } catch(e){ try{ errorLog('advancedCalculateCouponDiscount error:', e);}catch(_){} return 0; }
  }
  if (typeof calculateCouponDiscount === 'function') { window.calculateCouponDiscount = advancedCalculateCouponDiscount; }

  // === Override updateCheckoutOrderTotal to support flat fee + min order ===
  const __origUpdateTotal = (typeof updateCheckoutOrderTotal === 'function') ? updateCheckoutOrderTotal : null;
  window.updateCheckoutOrderTotal = function(){
    try {
      const cfg = (typeof getCheckoutConfig === 'function') ? getCheckoutConfig() : {};
      const flat = getFlatDeliveryFee();
      const totalEl = document.getElementById('checkout-order-total');
      const cartTotal = (typeof calculateCartTotal === 'function') ? calculateCartTotal() : 0;
      const isDelivery = (typeof orderData !== 'undefined' && orderData && orderData.deliveryType === 'delivery');
      const fee = isDelivery ? (flat !== null ? flat : ((orderData && orderData.address && typeof orderData.address.deliveryFee !== 'undefined') ? orderData.address.deliveryFee : (typeof currentDeliveryFee !== 'undefined' && currentDeliveryFee !== null ? currentDeliveryFee : 0))) : 0;
      let finalTotal = cartTotal + fee;
      if (typeof appliedCoupon !== 'undefined' && appliedCoupon && (window.couponDiscount || window.couponDiscount === 0)){
        finalTotal = Math.max(0, finalTotal - (window.couponDiscount || 0));
      }
      if (totalEl) totalEl.textContent = (typeof formatCurrency === 'function') ? formatCurrency(finalTotal) : finalTotal.toFixed(2);
      if (typeof updateOrderSummary === 'function') updateOrderSummary(cartTotal, fee);
      // Minimum order alert
      const minRaw = cfg && cfg.pedido_minimo ? String(cfg.pedido_minimo).trim() : '';
      const minValue = minRaw ? parseFloat(minRaw.replace(',', '.')) : null;
      const minAlertId = 'min-order-alert';
      const container = document.getElementById('checkout-step-3');
      const existing = document.getElementById(minAlertId);
      if (container && minValue && !isNaN(minValue) && minValue > 0){
        if (finalTotal < minValue){
          if (!existing){
            const div = document.createElement('div');
            div.id = minAlertId; div.className = 'mt-3 p-3 rounded border-l-4';
            div.style.backgroundColor = '#fff7ed'; div.style.borderColor = '#f59e0b';
            div.innerHTML = `⚠️ O pedido mínimo é de <strong>${(typeof formatCurrency==='function'?formatCurrency(minValue):minValue.toFixed(2))}</strong>. Adicione mais itens para continuar.`;
            container.appendChild(div);
          } else { existing.style.display = ''; }
        } else if (existing){ existing.style.display = 'none'; }
      } else if (existing){ existing.style.display='none'; }
    } catch(e){ try{ errorLog('updateCheckoutOrderTotal override error:', e);}catch(_){} }
    if (__origUpdateTotal && __origUpdateTotal !== window.updateCheckoutOrderTotal){ try{ /* no-op: we handled UI */ }catch(_){} }
  };

  // === Hook showStep to render scheduling field (optional) ===
  function ensureSchedulingField(){
    try {
      const cfg = (typeof getCheckoutConfig==='function') ? getCheckoutConfig() : {};
      if ((cfg.ativar_agendamento || 'Não') !== 'Sim') return;
      const step3 = document.getElementById('checkout-step-3'); if (!step3) return;
      if (document.getElementById('schedule-container')) return;
      const wrap = document.createElement('div');
      wrap.id = 'schedule-container'; wrap.className = 'mt-3';
      wrap.innerHTML = '<label class="block text-sm font-medium mb-2" style="color: var(--cor-texto)">Agendar pedido (opcional)</label><input type="datetime-local" id="order-schedule" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:border-transparent" />';
      step3.appendChild(wrap);
    } catch(_){}
  }
  const __origShowStep = (typeof showStep==='function') ? showStep : null;
  if (__origShowStep){
    window.showStep = function(step){ const r = __origShowStep.apply(this, arguments); if (step===3) { setTimeout(ensureSchedulingField, 100); setTimeout(window.updateCheckoutOrderTotal, 150); } return r; };
  }

  // === Block finalizeOrder if below minimum order and attach schedule ===
  const __origFinalize = (typeof finalizeOrder==='function') ? finalizeOrder : null;
  if (__origFinalize){
    window.finalizeOrder = function(){
      try {
        const cfg = (typeof getCheckoutConfig==='function') ? getCheckoutConfig() : {};
        const minRaw = cfg && cfg.pedido_minimo ? String(cfg.pedido_minimo).trim() : '';
        const minValue = minRaw ? parseFloat(minRaw.replace(',', '.')) : null;
        if (minValue && !isNaN(minValue) && minValue > 0){
          // recompute
          if (typeof updateCheckoutOrderTotal === 'function') updateCheckoutOrderTotal();
          const cartTotal = (typeof calculateCartTotal === 'function') ? calculateCartTotal() : 0;
          const flat = getFlatDeliveryFee();
          const fee = (typeof orderData !== 'undefined' && orderData && orderData.deliveryType === 'delivery') ? (flat !== null ? flat : (orderData.address && typeof orderData.address.deliveryFee !== 'undefined' ? orderData.address.deliveryFee : (typeof currentDeliveryFee !== 'undefined' ? currentDeliveryFee : 0))) : 0;
          let total = cartTotal + fee; if (typeof couponDiscount !== 'undefined' && couponDiscount > 0) total = Math.max(0, total - couponDiscount);
          if (total < minValue){
            if (typeof showToast==='function') showToast(`⚠️ O pedido mínimo é de R$ ${minValue.toFixed(2)}. Adicione mais itens para continuar.`, 'warning', 4000);
            return; // block
          }
        }
        // Attach schedule
        try {
          const input = document.getElementById('order-schedule');
          if (input && input.value){
            const selected = new Date(input.value);
            if (isNaN(selected.getTime()) || selected.getTime() < Date.now()){
              if (typeof showToast==='function') showToast('Informe uma data/hora futura para agendamento.', 'error');
              return;
            }
            if (typeof orderData==='undefined' || !orderData) window.orderData = {};
            orderData.orderSchedule = selected.toISOString();
          }
        } catch(_){}
      } catch(_){}
      return __origFinalize.apply(this, arguments);
    };
  }

  // === Include schedule info in WhatsApp message ===
  const __origFormatMsg = (typeof formatOrderMessage==='function') ? formatOrderMessage : null;
  if (__origFormatMsg){
    window.formatOrderMessage = function(){
      let msg = __origFormatMsg.apply(this, arguments);
      try {
        if (typeof orderData !== 'undefined' && orderData && orderData.orderSchedule){
          const when = new Date(orderData.orderSchedule).toLocaleString('pt-BR');
          const anchor = '\n✅ *Aguardando confirmação do estabelecimento*';
          if (msg.includes(anchor)) msg = msg.replace(anchor, `\n🗓️ *Agendamento:* ${when}${anchor}`);
          else msg += `\n🗓️ *Agendamento:* ${when}`;
        }
      } catch(_){}
      return msg;
    };
  }

  // === Loyalty: increment after successful reset ===
  function incrementLoyaltyAndMaybeGrantCoupon(customerId){
    try {
      const premioRaw = (typeof getConfig==='function') ? getConfig('fidelidade', 'premio_cada', '') : '';
      const valorRaw = (typeof getConfig==='function') ? getConfig('fidelidade', 'valor_cupom', '') : '';
      const alvo = toNumber(premioRaw) || 0; const valor = toNumber(valorRaw) || 0;
      if (!alvo || !valor) return;
      const key = 'cardapio_loyalty_counts'; const genKey = 'cardapio_loyalty_generated';
      const counts = JSON.parse(localStorage.getItem(key) || '{}');
      counts[customerId] = (counts[customerId] || 0) + 1;
      localStorage.setItem(key, JSON.stringify(counts));
      if (counts[customerId] % alvo === 0){
        const code = `FID-${Date.now().toString().slice(-6)}`;
        localStorage.setItem(genKey, JSON.stringify({ code, value: valor }));
        if (typeof showToast==='function') showToast(`🎁 Você ganhou um cupom de R$ ${valor.toFixed(2)}: ${code}`, 'success', 6000);
        try { const input = document.getElementById('coupon-code'); if (input) input.value = code; } catch(_){}
      }
    } catch(e){ try{ errorLog('Loyalidade erro:', e);}catch(_){} }
  }
  const __origReset = (typeof resetSystemAfterOrder==='function') ? resetSystemAfterOrder : null;
  if (__origReset){
    window.resetSystemAfterOrder = function(){
      let customerId = '';
      try { customerId = (orderData && (orderData.customerWhatsApp || orderData.customerName)) || ''; } catch(_){}
      const r = __origReset.apply(this, arguments);
      if (customerId) incrementLoyaltyAndMaybeGrantCoupon(customerId);
      return r;
    };
  }
})();
</script>
